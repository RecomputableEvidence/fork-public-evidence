name: Independent Verification Hardening v0.1.1

on:
  pull_request:
    paths:
      - 'tools/check_independent_verification_surface_v0_1_1.py'
      - 'tools/run_independent_verification_fresh_v0_1_1.py'
      - 'policies/independent-verification/INDEPENDENT_VERIFICATION_POLICY_v0_1_1.json'
      - 'schemas/independent_verification_*_v0_1_1.schema.json'
      - 'verification/plans/PR_63_CSH_AMENDMENT_v0_1_1.json'
      - 'receipts/independent-verification/PR_63_CSH_AMENDMENT_VERIFICATION_v0_1_1.json'
      - 'tests/test_independent_verification_surface_v0_1_1.py'
      - '.github/workflows/independent-verification-hardening-v0-1-1.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-hardened-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PACKAGE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install locked verification dependencies
        run: |
          python -m pip install --require-hashes -r requirements-proof-surface.lock.txt
          python -m pip install --require-hashes -r requirements-claim-admission.lock.txt
      - name: Fetch exact verification subjects
        run: |
          git -c protocol.file.allow=never fetch --no-tags --no-recurse-submodules origin \
            599d3e193d86a9661fbbec3213ae1921b4959f10 \
            82c34252d7b8d9e8957fb5a86500e12da6cf363a \
            1102113556edfc54b43a328317961c4896d6dd6c \
            e366e44cb2059f5cb7243757b95fa8d44859b811
      - name: Recompute committed hardened receipt
        run: |
          python tools/check_independent_verification_surface_v0_1_1.py \
            --plan verification/plans/PR_63_CSH_AMENDMENT_v0_1_1.json \
            --write-receipt /tmp/PR_63_CSH_AMENDMENT_VERIFICATION_v0_1_1.json
          cmp --silent \
            /tmp/PR_63_CSH_AMENDMENT_VERIFICATION_v0_1_1.json \
            receipts/independent-verification/PR_63_CSH_AMENDMENT_VERIFICATION_v0_1_1.json
      - name: Run v0.1.1 adversarial tests
        run: python -m pytest tests/test_independent_verification_surface_v0_1_1.py -q
      - name: Recompute from empty disposable repository
        run: |
          python tools/run_independent_verification_fresh_v0_1_1.py \
            --repository RecomputableEvidence/fork-public-evidence \
            --package-commit "$PACKAGE_COMMIT" \
            --plan verification/plans/PR_63_CSH_AMENDMENT_v0_1_1.json \
            --expected-receipt receipts/independent-verification/PR_63_CSH_AMENDMENT_VERIFICATION_v0_1_1.json
