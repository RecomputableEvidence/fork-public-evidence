name: Fork Evidence CI

on:
  pull_request:
  push:
    branches:
      - main
      - "v0_*"

jobs:
  evidence-ci:
    name: Claim Boundary and Preservation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema

      - name: Check governed text artifacts use LF
        run: python tools/check_line_endings.py

      - name: Validate Claim Boundary payload examples
        run: |
          python tools/check_claim_boundary.py examples/claim_boundary/valid_integrity_only.json

          if python tools/check_claim_boundary.py examples/claim_boundary/invalid_overclaim_compliance.json; then
            echo "Invalid overclaim payload unexpectedly passed."
            exit 1
          else
            echo "Invalid overclaim payload failed as expected."
          fi

      - name: Validate artifact-level Claim Boundary enforcement
        run: |
          python tools/check_artifact_claim_boundary.py examples/claim_boundary_artifacts/valid_receipt_with_claim_boundary.json

          if python tools/check_artifact_claim_boundary.py examples/claim_boundary_artifacts/invalid_receipt_missing_claim_boundary.json; then
            echo "Missing claim_boundary artifact unexpectedly passed."
            exit 1
          else
            echo "Missing claim_boundary artifact failed as expected."
          fi

          if python tools/check_artifact_claim_boundary.py examples/claim_boundary_artifacts/invalid_release_metadata_overclaim.json; then
            echo "Overclaiming release metadata unexpectedly passed."
            exit 1
          else
            echo "Overclaiming release metadata failed as expected."
          fi

      - name: Validate Claim Boundary Binding
        run: |
          python tools/check_artifact_claim_boundary.py examples/claim_boundary_binding/verification_result_bound_valid.json

          if python tools/check_artifact_claim_boundary.py examples/claim_boundary_binding/verification_result_unbound_invalid.json; then
            echo "Unbound verification result unexpectedly passed."
            exit 1
          else
            echo "Unbound verification result failed as expected."
          fi

          python tools/bind_claim_boundary.py \
            examples/claim_boundary_binding/verification_result_unbound_invalid.json \
            --output /tmp/verification_result_bound_generated.ci.json \
            --overwrite-output

          python tools/check_artifact_claim_boundary.py /tmp/verification_result_bound_generated.ci.json

      - name: Run full invariant test suite
        run: |
          python -m pytest \
            tests/test_claim_boundary_v0_1.py \
            tests/test_claim_boundary_phase_2.py \
            tests/test_claim_boundary_binding_v0_1.py \
            tests/test_line_endings_v0_1.py \
            tests/test_ci_workflow_v0_1.py \
            -q