name: Claim Inheritance Simulation Checker

on:
  push:
    paths:
      - 'tools/check_claim_inheritance_simulation_model.py'
      - 'tests/test_claim_inheritance_simulation_model_v0_1.py'
      - 'schemas/claim_inheritance_checker_output_v0_1_5.schema.json'
      - 'examples/claim_inheritance_simulation_model/**'
      - '.github/workflows/claim-inheritance-simulation-checker.yml'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_SEMANTICS_v0_1_3.md'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_BOUNDARY_LOCK_v0_1_4.md'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_CONTRACT_LOCK_v0_1_5.md'
      - 'docs/CLAIM_INHERITANCE_SIMULATION_CHECKER_LIMITATIONS_v0_1_2.md'
  pull_request:
    paths:
      - 'tools/check_claim_inheritance_simulation_model.py'
      - 'tests/test_claim_inheritance_simulation_model_v0_1.py'
      - 'schemas/claim_inheritance_checker_output_v0_1_5.schema.json'
      - 'examples/claim_inheritance_simulation_model/**'
      - '.github/workflows/claim-inheritance-simulation-checker.yml'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_SEMANTICS_v0_1_3.md'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_BOUNDARY_LOCK_v0_1_4.md'
      - 'docs/CLAIM_INHERITANCE_CHECKER_OUTPUT_CONTRACT_LOCK_v0_1_5.md'
      - 'docs/CLAIM_INHERITANCE_SIMULATION_CHECKER_LIMITATIONS_v0_1_2.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claim-inheritance-simulation-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements-proof-surface.lock.txt

      - name: Run valid synthetic bundle
        run: python tools/check_claim_inheritance_simulation_model.py examples/claim_inheritance_simulation_model/synthetic_claim_inheritance_simulation_bundle_v0_1.json --pretty

      - name: Run invalid fixture manifest harness
        run: python tools/check_claim_inheritance_simulation_model.py --invalid-manifest --pretty

      - name: Assert legacy output disabled
        run: |
          set +e
          python tools/check_claim_inheritance_simulation_model.py examples/claim_inheritance_simulation_model/synthetic_claim_inheritance_simulation_bundle_v0_1.json --legacy-output --pretty > legacy.json
          code=$?
          set -e
          test "$code" = "2"
          python - <<'PY'
          import json
          payload = json.load(open("legacy.json", encoding="utf-8"))
          assert payload["result_kind"] == "LEGACY_OUTPUT_DISABLED"
          assert payload["output_semantics_version"] == "0.1.5"
          assert payload["structural_result"] is None
          assert payload["harness_result"] is None
          PY

      - name: Run pytest suite
        run: python -m pytest -q tests/test_claim_inheritance_simulation_model_v0_1.py
