name: Root Checksum Manifest v0.1

on:
  pull_request:
  push:
    branches:
      - main
      - preservation/clean-continuance-v0.1
      - "v0_*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  root-checksum-manifest:
    name: Root checksum manifest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git line endings
        run: git config --global core.autocrlf false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Verify repaired manifest and preserved discrepancy
        run: python tools/check_root_checksum_manifest_v0_1.py --json
