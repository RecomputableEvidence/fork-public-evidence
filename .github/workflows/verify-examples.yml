name: Verify Observed Evidence Packet examples

on:
  pull_request:
    paths:
      - "examples/observed-evidence-packets/**"
      - "scripts/**"
      - "schema/**"
      - ".github/workflows/verify-examples.yml"
  push:
    branches:
      - examples/recomputability-class-suite
    paths:
      - "examples/observed-evidence-packets/**"
      - "scripts/**"
      - "schema/**"
      - ".github/workflows/verify-examples.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: python -m pip install --require-hashes -r requirements-proof-surface.lock.txt

      - name: Verify observed evidence packet examples
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob

          found=0
          for manifest in examples/observed-evidence-packets/*/manifest.json; do
            packet_dir="$(dirname "$manifest")"
            found=1

            echo "Verifying ${packet_dir}"

            bash scripts/generate_sha256sums.sh "$packet_dir"
            bash scripts/verify_packet.sh "$packet_dir"

            if [ ! -f "${packet_dir}/verification_result.json" ]; then
              echo "ERROR: verification_result.json was not generated for ${packet_dir}" >&2
              exit 2
            fi
          done

          if [ "$found" -ne 1 ]; then
            echo "ERROR: no packet directories with manifest.json were found" >&2
            exit 2
          fi
